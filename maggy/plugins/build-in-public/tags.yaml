# Smart tagging — who to mention on each platform
# Maps topic/brand → social handles

platforms:
  linkedin:
    accounts:
      # AI & Dev Tools
      - name: GitHub
        handle: github
        trigger_keywords: [github, git, repo, open source, PR, pull request]
      - name: Anthropic
        handle: anthropic
        trigger_keywords: [claude, anthropic, sonnet, opus, haiku]
      - name: OpenAI
        handle: openai
        trigger_keywords: [openai, gpt, codex, chatgpt]
      - name: Google DeepMind
        handle: google-deepmind
        trigger_keywords: [gemini, google, deepmind, gemma]
      - name: DeepSeek
        handle: deepseek
        trigger_keywords: [deepseek]
      - name: Moonshot AI
        handle: moonshot-ai
        trigger_keywords: [kimi, moonshot]
      - name: Buffer
        handle: buffer
        trigger_keywords: [buffer, social media scheduling]
      - name: Ollama
        handle: ollama
        trigger_keywords: [ollama, qwen, local model]
      # Competitors & landscape
      - name: OpenRouter
        handle: openrouter
        trigger_keywords: [openrouter]
