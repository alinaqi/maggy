id: build-in-public
version: 1
entrypoint: plugin.py
permissions: [github.read, buffer.write, reddit.write, screenshots.capture, ai.generate]
hooks:
  - event: on_pr_merged
    handler: handle_pr_merged
  - event: on_feature_shipped
    handler: handle_feature_shipped
  - event: on_review_passed
    handler: handle_review_passed
  - event: on_thread_requested
    handler: handle_thread_requested
config:
  tone: "confident, sharp, no hype sludge — sounds like the builder, not a bot"
  channels:
    linkedin:
      profile: "personal"
      max_chars: 3000
      tone: "professional, insightful, teaches something. 1-2 paragraphs. Engineers and CTOs read this."
      schedule: "09:00 UTC weekdays"
    x:
      profile: "personal"
      max_chars: 280
      tone: "sharp, punchy, no threads unless the insight is too good. Developers who ship read this."
      schedule: "10:30 UTC weekdays"
    reddit:
      # Optional. Leave blank — Maggy chooses autonomously (defaults to
      # r/buildinpublic, or topics.yaml `reddit_publish`). Override only to
      # force a specific subreddit.
      subreddit: ""
      max_chars: 8000
      tone: "authentic, story-first, no marketing speak. Redditors downvote hype. Lead with the problem and what you learned."
      schedule: "11:00 UTC weekdays"
  approval_mode: "auto_if_safe"
  screenshot:
    mode: "playwright"
  schedule:
    preferred_time: "09:00 UTC"
    max_posts_per_day: 2
