id: build-in-public
version: 1
entrypoint: plugin.py
permissions: [github.read, buffer.write, screenshots.capture, ai.generate]
hooks:
  - event: on_pr_merged
    handler: handle_pr_merged
  - event: on_feature_shipped
    handler: handle_feature_shipped
  - event: on_review_passed
    handler: handle_review_passed
config:
  tone: "confident, sharp, no hype sludge — sounds like the builder, not a bot"
  channels: ["linkedin"]
  approval_mode: "auto_if_safe"
  screenshot:
    mode: "playwright"
  schedule:
    preferred_time: "09:00 UTC"
    max_posts_per_day: 1
