<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maggy — AI Command Center</title>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com 'unsafe-inline';
    font-src 'self' https://cdnjs.cloudflare.com data:;
    connect-src 'self';
    img-src 'self' data:;
    frame-ancestors 'none';
    base-uri 'self';
  " />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root { --bg: #060912; --surface: rgba(15,19,26,0.85); --border: rgba(255,255,255,0.06); --text: #c9cdd4; --text-muted: #5e6570; --accent: #f97316; --accent-glow: rgba(249,115,22,0.12); --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, monospace; overflow: hidden; }
    /* Glassmorphism */
    .glass { background: rgba(15,19,26,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.5rem; }
    .glass-sidebar { background: rgba(6,9,18,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .glass-card { background: rgba(15,19,26,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.04); border-radius: 0.5rem; }
    .glass-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 0.375rem; color: var(--text); padding: 0.5rem 0.75rem; outline: none; transition: border-color 0.2s; }
    .glass-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
    .sidebar-link { transition: all 0.15s ease; border-left: 2px solid transparent; color: var(--text-muted); }
    .sidebar-link:hover { background: rgba(249,115,22,0.05); color: #d1d5db; border-left-color: rgba(249,115,22,0.3); }
    .sidebar-link.active { background: var(--accent-glow); border-left-color: var(--accent); color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; }
    .btn { transition: all 0.15s ease; border-radius: 0.375rem; padding: 0.375rem 0.75rem; font-size: 0.8125rem; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; border: none; } .btn-primary:hover { background: #ea580c; }
    .btn-ghost { color: var(--text-muted); background: transparent; border: 1px solid transparent; } .btn-ghost:hover { background: rgba(255,255,255,0.04); color: #d1d5db; border-color: rgba(255,255,255,0.06); }
    pre { white-space: pre-wrap; word-break: break-word; }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
    .shimmer-bar { background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:shimmer 1.5s infinite; }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 4px var(--accent-glow)} 50%{box-shadow:0 0 12px rgba(249,115,22,0.3)} }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .chat-md h1,.chat-md h2,.chat-md h3 { font-weight:600; margin:0.5em 0 0.25em; }
    .chat-md h1 { font-size:1.1em; color:var(--accent); } .chat-md h2 { font-size:1em; color:#fff; }
    .chat-md code { background:rgba(255,255,255,0.05); padding:1px 4px; border-radius:3px; font-size:0.9em; color:#fbbf24; }
    .chat-md pre { background:rgba(255,255,255,0.04); padding:8px; border-radius:6px; overflow-x:auto; margin:0.5em 0; border: 1px solid var(--border); }
    .chat-md pre code { background:none; padding:0; }
    .chat-md ul,.chat-md ol { padding-left:1.5em; margin:0.25em 0; }
    .chat-md li { margin:2px 0; }
    .chat-md a { color:var(--accent); text-decoration:underline; }
    .chat-md p { margin:0.25em 0; }
    .chat-md blockquote { border-left:3px solid var(--accent); padding-left:0.75em; color:#9ca3af; }
    .chat-md table { border-collapse:collapse; margin:0.5em 0; }
    .chat-md th,.chat-md td { border:1px solid rgba(255,255,255,0.08); padding:4px 8px; font-size:0.85em; }
    .scroll-thin::-webkit-scrollbar { width: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px; border-radius: 9999px; font-size: 0.6875rem; font-weight: 500; }
    .model-badge { background: rgba(249,115,22,0.15); color: var(--accent); border: 1px solid rgba(249,115,22,0.3); }
    .status-ok { color: var(--green); } .status-warn { color: var(--yellow); } .status-err { color: var(--red); }
    #project-search-results { max-height: 350px; overflow-y: auto; }
    #project-search-results::-webkit-scrollbar { width: 3px; }
    #project-search-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
    .pane-content { padding: 1rem; height: 100%; overflow-y: auto; }
    .pane-content::-webkit-scrollbar { width: 3px; }
    .pane-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
  </style>
</head>
<body class="h-screen flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-[220px] flex-shrink-0 border-r flex flex-col glass-sidebar" style="border-color:var(--border)">
    <div class="px-4 py-3.5 flex items-center gap-2.5 border-b" style="border-color:var(--border)">
      <i class="fas fa-robot text-orange-500 text-lg"></i>
      <span class="font-bold text-white text-sm tracking-tight">Maggy</span>
      <span class="text-[10px] text-gray-600 ml-auto font-mono">v0.2</span>
    </div>
    <div class="px-3 py-2.5 space-y-2">
      <button onclick="openProjectSearch()" class="w-full text-left flex items-center gap-2 text-xs py-1.5 px-2.5 rounded-md glass-input" style="font-size:0.75rem;cursor:pointer">
        <i class="fas fa-search text-gray-500 text-[10px]"></i>
        <span class="flex-1 truncate" id="current-project-label">Select project...</span>
        <kbd class="text-[9px] text-gray-600 ml-1 font-mono">⌘K</kbd>
      </button>
      <div id="sidebar-active-projects" class="space-y-0.5"></div>
      <button onclick="openNewProject()" class="w-full text-left flex items-center gap-2 text-xs py-1.5 px-2.5 rounded-md hover:bg-orange-500/10 text-gray-500 hover:text-orange-400 transition-colors" style="font-size:0.75rem">
        <i class="fas fa-plus text-[10px]"></i>
        <span>New Project</span>
      </button>
    </div>
    <nav class="flex-1 px-2 py-1 overflow-y-auto scroll-thin space-y-0.5">
      <div class="text-[9px] text-gray-600 uppercase tracking-widest px-2.5 pt-2 pb-1 font-mono">Work</div>
      <a href="#" onclick="switchTab('chat')" data-tab="chat" class="sidebar-link active flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-terminal text-[11px] w-4 text-center opacity-60"></i> Chat</a>
      <a href="#" onclick="switchTab('inbox')" data-tab="inbox" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-list-check text-[11px] w-4 text-center opacity-60"></i> Inbox</a>
      <a href="#" onclick="switchTab('followed')" data-tab="followed" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-eye text-[11px] w-4 text-center opacity-60"></i> Watching</a>
      <a href="#" onclick="switchTab('progress')" data-tab="progress" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-bars-progress text-[11px] w-4 text-center opacity-60"></i> Progress</a>
      <div class="text-[9px] text-gray-600 uppercase tracking-widest px-2.5 pt-2 pb-1 font-mono">Intel</div>
      <a href="#" onclick="switchTab('competitors')" data-tab="competitors" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-chess text-[11px] w-4 text-center opacity-60"></i> Competitors</a>
      <a href="#" onclick="switchTab('process')" data-tab="process" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-chart-line text-[11px] w-4 text-center opacity-60"></i> Insights</a>
      <a href="#" onclick="switchTab('icpg')" data-tab="icpg" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-project-diagram text-[11px] w-4 text-center opacity-60"></i> iCPG</a>
      <div class="text-[9px] text-gray-600 uppercase tracking-widest px-2.5 pt-2 pb-1 font-mono">System</div>
      <a href="#" onclick="switchTab('memory')" data-tab="memory" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-brain text-[11px] w-4 text-center opacity-60"></i> Memory</a>
      <a href="#" onclick="switchTab('routing')" data-tab="routing" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-route text-[11px] w-4 text-center opacity-60"></i> Models</a>
      <a href="#" onclick="switchTab('budget')" data-tab="budget" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-wallet text-[11px] w-4 text-center opacity-60"></i> Budget</a>
      <a href="#" onclick="switchTab('forge')" data-tab="forge" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-hammer text-[11px] w-4 text-center opacity-60"></i> Forge</a>
      <a href="#" onclick="switchTab('settings')" data-tab="settings" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-sliders text-[11px] w-4 text-center opacity-60"></i> Settings</a>
    </nav>
    <div class="px-3 py-2 border-t space-y-2" style="border-color:var(--border)">
      <div class="text-[10px] text-gray-500 px-2">
        <span class="text-gray-600">Tracker:</span>
        <select id="sidebar-tracker" onchange="setProjectTracker(this.value)" class="ml-1 bg-transparent text-gray-400 text-[10px] border border-white/5 rounded px-1 py-0.5 outline-none focus:border-orange-500/30">
          <option value="">native</option>
          <option value="github">github</option>
          <option value="asana">asana</option>
          <option value="monday">monday</option>
        </select>
      </div>
      <div id="sidebar-fatigue" class="text-[10px] text-gray-500 px-2">
        <span class="text-gray-600">Memory:</span> <span id="fatigue-badge" class="status-ok">—</span>
      </div>
    </div>
  </aside>
  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="border-b px-5 py-2 flex items-center gap-3 glass" style="border-color:var(--border)">
      <div id="header-context" class="flex items-center gap-2 text-xs text-gray-400 flex-1">
        <span id="header-model" class="badge model-badge hidden"></span>
        <span id="header-blast" class="hidden text-gray-500"></span>
        <span class="flex-1"></span>
      </div>
      <div class="flex items-center gap-2">
        <div id="heartbeat-indicator" class="flex items-center gap-1 text-[10px] text-gray-600">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse-glow"></span>
          <span>live</span>
        </div>
        <button onclick="loadAll()" class="btn btn-ghost text-[10px]" title="Refresh all"><i class="fas fa-sync-alt"></i></button>
      </div>
    </header>
    <main class="flex-1 overflow-hidden">
      <div id="pane-chat" class="h-full"><div class="flex items-center justify-center h-full text-gray-600 text-xs">Loading chat...</div></div>
      <div id="pane-inbox" class="h-full p-4 hidden"></div>
      <div id="pane-followed" class="h-full p-4 hidden"></div>
      <div id="pane-progress" class="h-full p-4 hidden"></div>
      <div id="pane-competitors" class="h-full p-4 hidden"></div>
      <div id="pane-process" class="h-full p-4 hidden"></div>
      <div id="pane-icpg" class="h-full p-4 hidden"></div>
      <div id="pane-memory" class="h-full p-4 hidden"></div>
      <div id="pane-routing" class="h-full p-4 hidden"></div>
      <div id="pane-budget" class="h-full p-4 hidden"></div>
      <div id="pane-forge" class="h-full p-4 hidden"></div>
      <div id="pane-settings" class="h-full p-4 hidden"></div>
    </main>
  </div>
  <!-- Project Search Modal -->
  <div id="project-search-overlay" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-[15vh]" style="background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">
    <div class="glass-card w-[480px] max-w-[90vw] p-4 shadow-2xl">
      <div class="flex items-center gap-2.5 mb-3">
        <i class="fas fa-search text-gray-500 text-xs"></i>
        <input id="project-search-input" type="text" placeholder="Search projects, tasks, or jump to..."
               class="flex-1 bg-transparent text-sm outline-none py-2 text-white placeholder-gray-600"
               oninput="filterProjects()" onkeydown="handleProjectSearchKey(event)" autofocus />
        <kbd class="text-[10px] text-gray-600 font-mono">esc</kbd>
      </div>
      <div id="project-search-results" class="text-xs space-y-0.5"></div>
    </div>
  </div>
  <!-- New Project Modal -->
  <div id="new-project-overlay" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-[20vh]" style="background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">
    <div class="glass-card w-[440px] max-w-[90vw] p-5 shadow-2xl">
      <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2"><i class="fas fa-plus text-orange-500"></i> New Project</h3>
      <div class="space-y-3">
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">Project Name</label>
          <input id="new-project-name" type="text" placeholder="my-awesome-app"
                 class="glass-input w-full text-sm py-2 px-3" onkeydown="if(event.key==='Enter')createNewProject()" autofocus />
        </div>
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-wider mb-1 block">Directory</label>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500">~/Documents/</span>
            <input id="new-project-dir" type="text" placeholder="my-awesome-app"
                   class="glass-input flex-1 text-sm py-2 px-3" />
          </div>
        </div>
        <div class="flex items-center gap-2 pt-2">
          <button onclick="createNewProject()" class="btn btn-primary flex-1 py-2 text-sm font-medium">
            <i class="fas fa-magic mr-2"></i>Create & Initialize
          </button>
          <button onclick="closeNewProject()" class="btn btn-ghost text-sm px-4 py-2">Cancel</button>
        </div>
        <div id="new-project-status" class="hidden text-xs"></div>
      </div>
    </div>
  </div>
  <!-- Drawer -->
  <div id="drawer" class="fixed top-0 right-0 h-full w-[40rem] max-w-full glass-card border-l p-4 overflow-y-auto translate-x-full transition-transform z-40" style="border-color:var(--border);border-radius:0">
    <div class="flex items-center justify-between mb-3">
      <h3 id="drawer-title" class="text-sm font-bold text-white">Task</h3>
      <button onclick="closeDrawer()" class="text-gray-400 hover:text-white text-lg"><i class="fas fa-xmark"></i></button>
    </div>
    <div id="drawer-body" class="text-sm text-gray-300"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js?v=14"></script>
  <script>
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault(); openProjectSearch();
      }
      if (e.key === 'Escape') { closeProjectSearch(); closeDrawer(); }
    });

    function openProjectSearch() {
      var ov = document.getElementById('project-search-overlay');
      ov.classList.remove('hidden');
      var inp = document.getElementById('project-search-input');
      inp.value = ''; inp.focus();
      filterProjects();
    }
    function closeProjectSearch() {
      document.getElementById('project-search-overlay').classList.add('hidden');
    }
    function filterProjects() {
      var q = (document.getElementById('project-search-input').value || '').toLowerCase();
      var all = window._projectList || [];
      var recent = JSON.parse(localStorage.getItem('maggy-recent-projects') || '[]');
      var html = '';

      if (!all.length) {
        html = '<div class="px-3 py-3 text-gray-500">No projects configured. Add one in Settings.</div>';
      } else if (!q) {
        // No query: show recently active first, then "Show all..."
        var shown = {};
        var active = recent.filter(function(p) { return all.indexOf(p) >= 0; });
        var count = 0;
        // Recently active with green dot
        if (active.length) {
          html += '<div class="text-[9px] text-gray-600 uppercase tracking-wider px-3 py-1">Recently Active</div>';
          for (var i = 0; i < Math.min(active.length, 6); i++) {
            html += '<div class="px-3 py-2 hover:bg-white/5 rounded cursor-pointer flex items-center gap-2.5 transition-colors" onclick="jumpToProject(\'' + active[i].replace(/'/g, "\\\\'") + '\')"><i class="fas fa-circle text-[5px] text-green-500/60"></i><span>' + active[i] + '</span></div>';
            shown[active[i]] = true;
            count++;
          }
        }
        // "Show all projects" expander
        html += '<div class="border-t border-white/5 mt-1 pt-1"></div>';
        html += '<div class="text-[9px] text-gray-600 uppercase tracking-wider px-3 py-1">All Projects (' + all.length + ')</div>';
        for (var j = 0; j < all.length; j++) {
          if (shown[all[j]]) continue;
          html += '<div class="px-3 py-2 hover:bg-white/5 rounded cursor-pointer flex items-center gap-2.5 transition-colors" onclick="jumpToProject(\'' + all[j].replace(/'/g, "\\\\'") + '\')"><i class="fas fa-folder text-gray-600 text-[10px]"></i><span>' + all[j] + '</span></div>';
        }
      } else {
        // Search query: show filtered results
        var filtered = all.filter(function(i) { return i.toLowerCase().includes(q); });
        if (filtered.length) {
          html += '<div class="text-[9px] text-gray-600 uppercase tracking-wider px-3 py-1">' + filtered.length + ' match' + (filtered.length !== 1 ? 'es' : '') + '</div>';
          for (var k = 0; k < Math.min(filtered.length, 15); k++) {
            var isRecent = recent.indexOf(filtered[k]) >= 0;
            var icon = isRecent ? '<i class="fas fa-circle text-[5px] text-green-500/60"></i>' : '<i class="fas fa-folder text-gray-600 text-[10px]"></i>';
            html += '<div class="px-3 py-2 hover:bg-white/5 rounded cursor-pointer flex items-center gap-2.5 transition-colors" onclick="jumpToProject(\'' + filtered[k].replace(/'/g, "\\\\'") + '\')">' + icon + '<span>' + filtered[k] + '</span></div>';
          }
        } else {
          html = '<div class="px-3 py-3 text-gray-600">No matches for "' + q + '"</div>';
        }
      }
      document.getElementById('project-search-results').innerHTML = html;
    }
    function handleProjectSearchKey(e) {
      if (e.key === 'Escape') { closeProjectSearch(); return; }
      if (e.key === 'Enter') {
        var first = document.querySelector('#project-search-results div.cursor-pointer, #project-search-results div[onclick]');
        if (first) first.click();
      }
    }
    function jumpToProject(name) {
      closeProjectSearch();
      document.getElementById('current-project-label').textContent = name;
      if (typeof switchProject === 'function') switchProject(name);
    }
    function getTrackerStatus() {
      // Check which trackers have credentials available
      var status = {native: true};
      // These are checked via API — we show what the environment has
      fetch('/api/config').then(function(r){return r.json()}).then(function(cfg){
        var env = cfg.env || {};
        status.github = !!(env.GITHUB_TOKEN);
        status.asana = !!(env.ASANA_TOKEN);
        status.monday = !!(env.MONDAY_TOKEN);
        // Update dropdown to show available trackers
        var sel = document.getElementById('sidebar-tracker');
        if (!sel) return;
        var opts = sel.options;
        for (var i = 0; i < opts.length; i++) {
          var v = opts[i].value || 'native';
          if (v === 'native') continue;
          opts[i].text = status[v] ? v : v + ' (needs key)';
          if (!status[v]) opts[i].style.color = '#ef4444';
          else opts[i].style.color = '';
        }
      }).catch(function(){});
    }
    function setProjectTracker(type) {
      var proj = document.getElementById('current-project-label').textContent;
      if (!proj || proj === 'Select project...') return;
      fetch('/api/projects/' + proj + '/config', {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tracker: type})
      }).then(function() {
        document.getElementById('sidebar-tracker').style.borderColor = 'rgba(34,197,94,0.4)';
        setTimeout(function() { document.getElementById('sidebar-tracker').style.borderColor = ''; }, 1500);
      });
    }
    function updateCurrentProject(name) {
      document.getElementById('current-project-label').textContent = name || 'Select project...';
      // Track as recently active
      if (name) {
        var recent = JSON.parse(localStorage.getItem('maggy-recent-projects') || '[]');
        recent = recent.filter(function(p) { return p !== name; });
        recent.unshift(name);
        localStorage.setItem('maggy-recent-projects', JSON.stringify(recent.slice(0, 10)));
      }
    }

    function openNewProject() {
      document.getElementById('new-project-overlay').classList.remove('hidden');
      var inp = document.getElementById('new-project-name');
      inp.focus();
      // Auto-fill dir from name
      inp.addEventListener('input', function() {
        document.getElementById('new-project-dir').value = this.value.toLowerCase().replace(/\\s+/g, '-');
      });
    }
    function closeNewProject() {
      document.getElementById('new-project-overlay').classList.add('hidden');
    }

    async function createNewProject() {
      var name = document.getElementById('new-project-name').value.trim();
      var dir = document.getElementById('new-project-dir').value.trim() || name.toLowerCase().replace(/\\s+/g, '-');
      if (!name) return;

      var status = document.getElementById('new-project-status');
      status.classList.remove('hidden');
      status.className = 'text-xs text-gray-400 mt-2';
      status.innerHTML = '<i class=\"fas fa-spinner fa-spin mr-1\"></i>Creating ' + dir + '...';

      try {
        var resp = await fetch('/api/projects/create-new', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: name, directory: dir})
        });
        var data = await resp.json();
        if (data.ok) {
          status.className = 'text-xs text-green-400 mt-2';
          status.innerHTML = '<i class=\"fas fa-check mr-1\"></i>' + data.message;
          setTimeout(function() {
            closeNewProject();
            jumpToProject(name);
            location.reload();
          }, 1500);
        } else {
          status.className = 'text-xs text-red-400 mt-2';
          status.innerHTML = '<i class=\"fas fa-exclamation-triangle mr-1\"></i>' + (data.error || 'Failed');
        }
      } catch(e) {
        status.className = 'text-xs text-red-400 mt-2';
        status.innerHTML = '<i class=\"fas fa-exclamation-triangle mr-1\"></i>' + e.message;
      }
    }

    function renderActiveProjects() {
      var recent = JSON.parse(localStorage.getItem('maggy-recent-projects') || '[]');
      var all = window._projectList || [];
      var active = recent.filter(function(p) { return all.indexOf(p) >= 0; }).slice(0, 4);
      var el = document.getElementById('sidebar-active-projects');
      if (!el || !active.length) return;
      var html = '';
      for (var i = 0; i < active.length; i++) {
        var p = active[i];
        html += '<div class="flex items-center gap-2 px-2 py-1 rounded text-[10px] text-gray-500 hover:text-gray-300 hover:bg-white/[0.03] cursor-pointer transition-colors" onclick="jumpToProject(\'' + p.replace(/'/g, "\\'") + '\')"><i class="fas fa-circle text-[5px] text-green-500/50"></i><span class="truncate">' + p + '</span></div>';
      }
      el.innerHTML = html;
    }

    window.addEventListener('load', function() {
      getTrackerStatus();
      fetch('/api/projects').then(function(r){return r.json()}).then(function(data){
        var projects = (data.projects||[]).map(function(p){return typeof p === 'string' ? p : (p.name || p.key || '')}).filter(Boolean);
        window._projectList = projects;
        if (projects.length) {
          updateCurrentProject(projects[0]);
          // Seed current project as active so it shows in recent
          if (!localStorage.getItem('maggy-recent-projects')) {
            localStorage.setItem('maggy-recent-projects', JSON.stringify([projects[0]]));
          }
        }
        renderActiveProjects();
      }).catch(function(){
        window._projectList = [];
      });
    });
  </script>
</body>
</html>
