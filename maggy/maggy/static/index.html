<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maggy — AI Command Center</title>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com 'unsafe-inline';
    font-src 'self' https://cdnjs.cloudflare.com data:;
    connect-src 'self';
    img-src 'self' data:;
    frame-ancestors 'none';
    base-uri 'self';
  " />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root { --bg: #080b10; --surface: #0f131a; --border: #1e2636; --text: #d1d5db; --text-muted: #6b7280; --accent: #f97316; --accent-glow: rgba(249,115,22,0.15); --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
    body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    .sidebar-link { transition: all 0.15s ease; border-left: 2px solid transparent; }
    .sidebar-link:hover { background: var(--surface); color: #e5e7eb; }
    .sidebar-link.active { background: var(--accent-glow); border-left-color: var(--accent); color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; }
    .btn { transition: all 0.15s ease; border-radius: 0.375rem; padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
    .btn-primary { background: var(--accent); color: white; } .btn-primary:hover { background: #ea580c; }
    .btn-ghost { color: var(--text-muted); } .btn-ghost:hover { background: var(--surface); color: #e5e7eb; }
    pre { white-space: pre-wrap; word-break: break-word; }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
    .shimmer-bar { background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:shimmer 1.5s infinite; }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 4px var(--accent-glow)} 50%{box-shadow:0 0 12px rgba(249,115,22,0.3)} }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .chat-md h1,.chat-md h2,.chat-md h3 { font-weight:600; margin:0.5em 0 0.25em; }
    .chat-md h1 { font-size:1.1em; color:var(--accent); } .chat-md h2 { font-size:1em; color:#fff; }
    .chat-md code { background:#1e2433; padding:1px 4px; border-radius:3px; font-size:0.9em; color:#6ee7b7; }
    .chat-md pre { background:#1e2433; padding:8px; border-radius:6px; overflow-x:auto; margin:0.5em 0; }
    .chat-md pre code { background:none; padding:0; }
    .chat-md ul,.chat-md ol { padding-left:1.5em; margin:0.25em 0; }
    .chat-md li { margin:2px 0; }
    .chat-md a { color:var(--accent); text-decoration:underline; }
    .chat-md p { margin:0.25em 0; }
    .chat-md blockquote { border-left:3px solid var(--accent); padding-left:0.75em; color:#9ca3af; }
    .chat-md table { border-collapse:collapse; margin:0.5em 0; }
    .chat-md th,.chat-md td { border:1px solid #374151; padding:4px 8px; font-size:0.85em; }
    .scroll-thin::-webkit-scrollbar { width: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px; border-radius: 9999px; font-size: 0.6875rem; font-weight: 500; }
    .model-badge { background: rgba(249,115,22,0.15); color: var(--accent); border: 1px solid rgba(249,115,22,0.3); }
    .status-ok { color: var(--green); } .status-warn { color: var(--yellow); } .status-err { color: var(--red); }
    #project-search-results { max-height: 350px; overflow-y: auto; }
    #project-search-results::-webkit-scrollbar { width: 3px; }
    #project-search-results::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body class="h-screen flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-[220px] flex-shrink-0 border-r flex flex-col" style="background:var(--bg);border-color:var(--border)">
    <div class="px-4 py-3.5 flex items-center gap-2.5 border-b" style="border-color:var(--border)">
      <i class="fas fa-robot text-orange-500 text-lg"></i>
      <span class="font-bold text-white text-sm">Maggy</span>
      <span class="text-[10px] text-gray-600 ml-auto">v0.2</span>
    </div>
    <div class="px-3 py-2">
      <button onclick="openProjectSearch()" class="w-full text-left btn btn-ghost flex items-center gap-2 text-xs py-1.5 px-2.5" style="font-size:0.75rem">
        <i class="fas fa-search text-gray-500 text-[10px]"></i>
        <span class="flex-1 truncate" id="current-project-label">Select project...</span>
        <kbd class="text-[9px] text-gray-600 ml-1">Cmd+K</kbd>
      </button>
    </div>
    <nav class="flex-1 px-2 py-1 overflow-y-auto scroll-thin space-y-0.5">
      <div class="text-[9px] text-gray-600 uppercase tracking-wider px-2.5 py-1.5">Work</div>
      <a href="#" onclick="switchTab('chat')" data-tab="chat" class="sidebar-link active flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-terminal text-[11px] w-4 text-center"></i> Chat</a>
      <a href="#" onclick="switchTab('inbox')" data-tab="inbox" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-list-check text-[11px] w-4 text-center"></i> Inbox</a>
      <a href="#" onclick="switchTab('followed')" data-tab="followed" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-eye text-[11px] w-4 text-center"></i> Watching</a>
      <a href="#" onclick="switchTab('progress')" data-tab="progress" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-bars-progress text-[11px] w-4 text-center"></i> Progress</a>
      <div class="text-[9px] text-gray-600 uppercase tracking-wider px-2.5 py-2">Intel</div>
      <a href="#" onclick="switchTab('competitors')" data-tab="competitors" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-chess text-[11px] w-4 text-center"></i> Competitors</a>
      <a href="#" onclick="switchTab('process')" data-tab="process" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-chart-line text-[11px] w-4 text-center"></i> Insights</a>
      <a href="#" onclick="switchTab('icpg')" data-tab="icpg" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-project-diagram text-[11px] w-4 text-center"></i> iCPG</a>
      <div class="text-[9px] text-gray-600 uppercase tracking-wider px-2.5 py-2">System</div>
      <a href="#" onclick="switchTab('memory')" data-tab="memory" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-brain text-[11px] w-4 text-center"></i> Memory</a>
      <a href="#" onclick="switchTab('routing')" data-tab="routing" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-route text-[11px] w-4 text-center"></i> Models</a>
      <a href="#" onclick="switchTab('budget')" data-tab="budget" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-wallet text-[11px] w-4 text-center"></i> Budget</a>
      <a href="#" onclick="switchTab('forge')" data-tab="forge" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-hammer text-[11px] w-4 text-center"></i> Forge</a>
      <a href="#" onclick="switchTab('settings')" data-tab="settings" class="sidebar-link flex items-center gap-2.5 px-3 py-1.5 text-xs rounded-r"><i class="fas fa-sliders text-[11px] w-4 text-center"></i> Settings</a>
    </nav>
    <div class="px-3 py-2 border-t" style="border-color:var(--border)">
      <div id="sidebar-fatigue" class="text-[10px] text-gray-500 px-2">
        <span class="text-gray-600">Memory:</span> <span id="fatigue-badge" class="status-ok">—</span>
      </div>
    </div>
  </aside>
  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="border-b px-5 py-2 flex items-center gap-3" style="background:var(--surface);border-color:var(--border)">
      <div id="header-context" class="flex items-center gap-2 text-xs text-gray-400 flex-1">
        <span id="header-model" class="badge model-badge hidden"></span>
        <span id="header-blast" class="hidden text-gray-500"></span>
        <span class="flex-1"></span>
      </div>
      <div class="flex items-center gap-2">
        <div id="heartbeat-indicator" class="flex items-center gap-1 text-[10px] text-gray-600">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse-glow"></span>
          <span>live</span>
        </div>
        <button onclick="loadAll()" class="btn btn-ghost text-[10px]" title="Refresh all"><i class="fas fa-sync-alt"></i></button>
      </div>
    </header>
    <main class="flex-1 overflow-hidden">
      <div id="pane-chat" class="h-full"><div class="flex items-center justify-center h-full text-gray-600 text-xs">Loading chat...</div></div>
      <div id="pane-inbox" class="h-full hidden"></div>
      <div id="pane-followed" class="h-full hidden"></div>
      <div id="pane-progress" class="h-full hidden"></div>
      <div id="pane-competitors" class="h-full hidden"></div>
      <div id="pane-process" class="h-full hidden"></div>
      <div id="pane-icpg" class="h-full hidden"></div>
      <div id="pane-memory" class="h-full hidden"></div>
      <div id="pane-routing" class="h-full hidden"></div>
      <div id="pane-budget" class="h-full hidden"></div>
      <div id="pane-forge" class="h-full hidden"></div>
      <div id="pane-settings" class="h-full hidden"></div>
    </main>
  </div>
  <!-- Project Search Modal -->
  <div id="project-search-overlay" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-[15vh]" style="background:rgba(0,0,0,0.6)">
    <div class="card w-[480px] max-w-[90vw] p-3 shadow-2xl">
      <div class="flex items-center gap-2 px-2">
        <i class="fas fa-search text-gray-500 text-xs"></i>
        <input id="project-search-input" type="text" placeholder="Search projects, tasks, or jump to..."
               class="flex-1 bg-transparent text-sm outline-none py-2 text-white placeholder-gray-600"
               oninput="filterProjects()" onkeydown="handleProjectSearchKey(event)" autofocus />
        <kbd class="text-[10px] text-gray-600">esc</kbd>
      </div>
      <div id="project-search-results" class="mt-2 text-xs"></div>
    </div>
  </div>
  <!-- Drawer -->
  <div id="drawer" class="fixed top-0 right-0 h-full w-[40rem] max-w-full card border-l p-4 overflow-y-auto translate-x-full transition-transform z-40" style="border-color:var(--border)">
    <div class="flex items-center justify-between mb-3">
      <h3 id="drawer-title" class="text-sm font-bold text-white">Task</h3>
      <button onclick="closeDrawer()" class="text-gray-400 hover:text-white text-lg"><i class="fas fa-xmark"></i></button>
    </div>
    <div id="drawer-body" class="text-sm text-gray-300"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js?v=12"></script>
  <script>
    // Quick keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault(); openProjectSearch();
      }
      if (e.key === 'Escape') {
        closeProjectSearch(); closeDrawer();
      }
    });
    function openProjectSearch() {
      document.getElementById('project-search-overlay').classList.remove('hidden');
      document.getElementById('project-search-input').focus();
      filterProjects();
    }
    function closeProjectSearch() {
      document.getElementById('project-search-overlay').classList.add('hidden');
    }
    function filterProjects() {
      var q = document.getElementById('project-search-input').value.toLowerCase();
      var items = window._projectList || [];
      var html = '';
      var filtered = q ? items.filter(function(i) { return i.toLowerCase().includes(q); }) : items;
      for (var i = 0; i < Math.min(filtered.length, 12); i++) {
        html += '<div class="px-3 py-2 hover:bg-gray-800 rounded cursor-pointer flex items-center gap-2" onclick="jumpToProject(\'' + filtered[i].replace(/'/g, "\\'") + '\')"><i class="fas fa-folder text-gray-500 text-[10px]"></i> ' + filtered[i] + '</div>';
      }
      if (!filtered.length) html = '<div class="px-3 py-2 text-gray-600">No matches</div>';
      document.getElementById('project-search-results').innerHTML = html;
    }
    function handleProjectSearchKey(e) {
      if (e.key === 'Escape') closeProjectSearch();
      if (e.key === 'Enter') {
        var first = document.querySelector('#project-search-results div');
        if (first) first.click();
      }
    }
    function jumpToProject(name) {
      closeProjectSearch();
      document.getElementById('current-project-label').textContent = name;
      if (typeof switchProject === 'function') switchProject(name);
    }
    function updateCurrentProject(name) {
      document.getElementById('current-project-label').textContent = name || 'Select project...';
    }
    window.addEventListener('load', function() {
      fetch('/api/projects').then(function(r){return r.json()}).then(function(data){
        var projects = (data.projects||[]).map(function(p){return p.name});
        window._projectList = projects;
        if (projects.length) updateCurrentProject(projects[0]);
      }).catch(function(){});
    });
  </script>
</body>
</html>
